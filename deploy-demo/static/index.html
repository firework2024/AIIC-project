<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIIC Chatbot Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #647084;
      --line: #d9e0ea;
      --panel: #ffffff;
      --page: #f4f6f8;
      --brand: #156f68;
      --brand-dark: #0f4f4a;
      --assistant: #eef5f4;
      --user: #172033;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(980px, 100%);
      height: min(760px, calc(100vh - 48px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 55px rgba(23, 32, 51, 0.12);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    header {
      min-height: 76px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      background: #fbfcfd;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      color: var(--brand-dark);
      font-size: 13px;
      white-space: nowrap;
    }

    #messages {
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(#ffffff, #f8fafb);
    }

    .message {
      max-width: min(720px, 86%);
      padding: 13px 15px;
      border-radius: 8px;
      line-height: 1.55;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid #d6e4e1;
    }

    .user {
      align-self: flex-end;
      background: var(--user);
      color: white;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }

    textarea {
      resize: none;
      min-height: 48px;
      max-height: 140px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      line-height: 1.45;
      color: var(--ink);
      outline: none;
      background: white;
    }

    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(21, 111, 104, 0.12);
    }

    button {
      width: 92px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      background: #8aa7a3;
    }

    @media (max-width: 680px) {
      body { padding: 0; }
      .shell { height: 100vh; border-radius: 0; border: 0; }
      header { align-items: flex-start; flex-direction: column; }
      .status { white-space: normal; }
      .message { max-width: 94%; }
      form { grid-template-columns: 1fr; }
      button { width: 100%; height: 46px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <div class="mark">AI</div>
        <div>
          <h1>AIIC Chatbot Demo</h1>
          <p class="meta">DeepSeek 后端代理 · 公网部署检查</p>
        </div>
      </div>
      <div class="status" id="status">就绪</div>
    </header>

    <section id="messages" aria-live="polite">
      <div class="message assistant">你好，我是部署在云服务器上的测试聊天框。发一句话试试，我会通过服务器后端调用 DeepSeek。</div>
    </section>

    <form id="chat-form">
      <textarea id="prompt" rows="2" placeholder="输入消息，然后按 Ctrl+Enter 发送" required></textarea>
      <button id="send" type="submit">发送</button>
    </form>
  </main>

  <script>
    const form = document.querySelector('#chat-form');
    const promptInput = document.querySelector('#prompt');
    const messagesEl = document.querySelector('#messages');
    const sendButton = document.querySelector('#send');
    const statusEl = document.querySelector('#status');
    const history = [
      { role: 'system', content: 'You are a concise, helpful AIIC hackathon assistant. Reply in the same language as the user.' }
    ];

    function addMessage(role, content) {
      const node = document.createElement('div');
      node.className = `message ${role}`;
      node.textContent = content;
      messagesEl.appendChild(node);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(text) {
      history.push({ role: 'user', content: text });
      addMessage('user', text);
      sendButton.disabled = true;
      statusEl.textContent = '思考中...';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json; charset=utf-8' },
          body: JSON.stringify({ messages: history.slice(-16) })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || '请求失败');
        history.push({ role: 'assistant', content: data.reply });
        addMessage('assistant', data.reply);
        statusEl.textContent = `在线 · ${data.model}`;
      } catch (error) {
        addMessage('assistant', `请求失败：${error.message}`);
        statusEl.textContent = '需要检查';
      } finally {
        sendButton.disabled = false;
        promptInput.focus();
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = promptInput.value.trim();
      if (!text) return;
      promptInput.value = '';
      sendMessage(text);
    });

    promptInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && event.ctrlKey) form.requestSubmit();
    });
  </script>
</body>
</html>
